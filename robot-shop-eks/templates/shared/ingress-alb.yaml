{{- if .Values.ingressAlb.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: robot-shop-alb
  namespace: {{ .Values.namespace }}

  annotations:
    kubernetes.io/ingress.class: alb

    alb.ingress.kubernetes.io/scheme: {{ .Values.ingressAlb.scheme }}

    alb.ingress.kubernetes.io/target-type: ip

spec:
  ingressClassName: alb

  rules:
    - http:
        paths:
          - path: /

            pathType: Prefix

            backend:
              service:
                name: web

                port:
                  number: 80

{{- end }}