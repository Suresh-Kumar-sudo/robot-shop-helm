{{- if .Values.ingressLocal.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: robot-shop-local
  namespace: {{ .Values.namespace }}

  annotations:
    kubernetes.io/ingress.class: nginx

spec:
  ingressClassName: nginx

  rules:
    - host: {{ .Values.ingressLocal.host }}

      http:
        paths:
          - path: /

            pathType: Prefix

            backend:
              service:
                name: web

                port:
                  number: 80

{{- end }}