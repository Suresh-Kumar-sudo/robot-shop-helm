apiVersion: apps/v1
kind: Deployment

metadata:
  name: cart
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.cart.replicaCount }}

  selector:
    matchLabels:
      app: cart

  template:
    metadata:
      labels:
        app: cart

    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true

        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-redis
          image: busybox:1.36

          securityContext:
            runAsNonRoot: false

          command:
            - sh
            - -c
            - until nc -z redis 6379; do sleep 2; done

      containers:
        - name: cart
          image: "{{ .Values.cart.image.repository }}:{{ .Values.cart.image.tag }}"
          imagePullPolicy: {{ .Values.cart.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.cart.service.port }}

          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false

            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: {{ .Values.cart.resources.requests.cpu | quote }}
              memory: {{ .Values.cart.resources.requests.memory | quote }}

            limits:
              cpu: {{ .Values.cart.resources.limits.cpu | quote }}
              memory: {{ .Values.cart.resources.limits.memory | quote }}

          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.cart.service.port }}

            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.cart.service.port }}

            initialDelaySeconds: 15
            periodSeconds: 10