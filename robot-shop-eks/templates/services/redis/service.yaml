apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: robot-shop
    app.kubernetes.io/component: redis

spec: 
  clusterIP: None 

  selector:
    app.kubernetes.io/component: redis

  ports:
  - name: redis
    port: {{ .Values.redis.service.port }}
    targetPort: {{ .Values.redis.service.port }}