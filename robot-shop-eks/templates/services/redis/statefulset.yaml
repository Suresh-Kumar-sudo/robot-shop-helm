apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: "robot-shop"
    app.kubernetes.io/component: "redis"


spec: 
  serviceName: redis
  replicas: 1

  selector: 
    matchLabels:
      app.kubernetes.io/component: redis

  template:
    metadata:
      labels: 
        app.kubernetes.io/name: robot-shop
        app.kubernetes.io/component: redis

    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}

      securityContext: 
        fsGroup: 999
        runAsNonRoot: true
        
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      
      containers:
      - name: redis
        image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag}}"
        imagePullPolicy: {{ .Values.redis.image.pullPolicy }}

        command:
        - redis-server
        - --appendonly
        - "yes"

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        
        ports: 
        - containerPort: {{ .Values.redis.service.port }}
          name: redis
        
        volumeMounts:
        - name: data
          mountPath: /data
        
        resources:
          
          requests:
            cpu:    {{ .Values.redis.resources.requests.cpu | quote }}
            memory: {{ .Values.redis.resources.requests.memory | quote }}
          
          limits:
            cpu:      {{ .Values.redis.resources.limits.cpu | quote }}
            memory:   {{ .Values.redis.resources.limits.memory | quote }}
        
        readinessProbe:
          exec:
            command:
            - redis-cli 
            - ping 
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 6

        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
  
  volumeClaimTemplates:
  - metadata:
      name: data

    spec: 
      accessModes:
      - ReadWriteOnce

      storageClassName: {{ .Values.global.storageClass }}

      resources:
        requests:
          storage: {{ .Values.redis.storage.size}}
