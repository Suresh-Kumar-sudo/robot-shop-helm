apiVersion: apps/v1
kind: Deployment
metadata: 
  name: dispatch 
  namespace: {{ .Values.namespace }} 
  labels:
    app.kubernetes.io/component: dispatch 

spec: 
  replicas: {{ .Values.dispatch.replicaCount }}

  selector: 
    matchLabels: 
      app.kubernetes.io/component: dispatch 
  
  template:
    metadata: 
      labels:
        app.kubernetes.io/component: dispatch 
    
    spec:

      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false

      securityContext:
        seccompProfile:
          type: RuntimeDefault 

      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done
          resources:
            requests:
              cpu: "100m"     
              memory: "32Mi" 
            limits:
              cpu: "200m"    
              memory: "64Mi" 
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"] 

      containers:
        - name: dispatch 
          image: "{{ .Values.dispatch.image.repository }}:{{ .Values.dispatch.image.tag }}"
          imagePullPolicy: {{ .Values.dispatch.image.pullPolicy }} 

          securityContext:
            allowPrivilegeEscalation: false 
            readOnlyRootFilesystem: false 
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: {{ .Values.dispatch.resources.requests.cpu | quote }}
              memory: {{ .Values.dispatch.resources.requests.memory | quote }}
            
            limits:
              cpu: {{ .Values.dispatch.resources.limits.cpu | quote }}
              memory: {{ .Values.dispatch.resources.limits.memory | quote }}

          livenessProbe:
            exec:
              command:
                - sh 
                - -c 
                - ps aux| grep dispatch | grep -v grep 
              
            initialDelaySeconds: 10 
            periodSeconds: 10 
            failureThreshold: 3