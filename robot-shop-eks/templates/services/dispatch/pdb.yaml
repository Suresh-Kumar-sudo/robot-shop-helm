{{- if .Values.dispatch.pdb.enabled }}

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dispatch-pdb
  namespace: {{ .Values.namespace }}

spec:
  maxUnavailable: {{ .Values.dispatch.pdb.maxUnavailable }}

  selector:
    matchLabels:
      app.kubernetes.io/component: dispatch


{{- end }}