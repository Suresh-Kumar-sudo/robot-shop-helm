{{- if .Values.user.hpa.enabled }}

apiVersion: autoscaling/v2 
kind: HorizontalPodAutoscaler 
metadata: 
  name: user-hpa
  namespace: {{ .Values.namespace }}
 

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment 
    name: user

  minReplicas: {{ .Values.user.hpa.minReplicas }}
  maxReplicas: {{ .Values.user.hpa.maxReplicas }} 

  metrics: 
    - type: Resource
      resource: 
        name: cpu 
        target: 
          type: Utilization 
          averageUtilization: {{ .Values.user.hpa.cpu }} 

{{- end }}