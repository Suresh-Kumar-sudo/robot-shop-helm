apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: user 
  namespace: {{ .Values.namespace }}

spec: 
  replicas: {{ .Values.user.replicaCount }}

  selector:
    matchLabels:  
      app.kubernetes.io/component: user 
    
  template:
    metadata: 
      labels: 
        app.kubernetes.io/component: user 
    
    spec: 

      serviceAccountName: {{ .Values.serviceAccount.name }} 
      automountServiceAccountToken: false

      initContainers:
        - name: wait-for-mongodb 
          image: busybox:1.36 
          command: ["sh","-c", "until nc -z mongodb 27017; do sleep 2; done"]

        - name: wait-for-redis 
          image: busybox:1.36 
          command: ["sh", "-c", "until nc -z redis 6379; do sleep 2; done"]
        
      containers:
        - name: user 
          image: "{{ .Values.user.image.repository }}:{{ .Values.user.image.tag }}"
          imagePullPolicy: {{ .Values.user.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.user.service.port }}
          
          securityContext: 
            allowPrivilegeEscalation: false 
            readOnlyRootFilesystem: false 
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu:  {{ .Values.user.resources.requests.cpu | quote }}
              memory: {{ .Values.user.resources.requests.memory | quote }}
            
            limits:
              cpu: {{ .Values.user.resources.limits.cpu | quote }}
              memory: {{ .Values.user.resources.limits.memory | quote }}

          readinessProbe: 
            httpGet:
              path: /health
              port: {{ .Values.user.service.port }}

            initialDelaySeconds: 5
            periodSeconds: 5 

          livenessProbe:
            httpGet:
              path: /health 
              port: {{ .Values.user.service.port }}
            initialDelaySeconds: 15 
            periodSeconds: 10