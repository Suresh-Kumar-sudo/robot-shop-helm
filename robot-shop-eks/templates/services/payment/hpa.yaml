{{- if .Values.payment.hpa.enabled }}

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: 
  name: payment-hpa
  namespace: {{ .Values.namespace }}

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment 
  
  minReplicas: {{ .Values.payment.hpa.minReplicas }}
  maxReplicas: {{ .Values.payment.hpa.maxReplicas }}

  metrics:
    - type: Resource
      resource:
        name: cpu 
        target: 
          type: Utilization
          averageUtilization: {{ .Values.payment.hpa.cpu }}

{{- end }}