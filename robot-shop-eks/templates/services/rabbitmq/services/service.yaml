apiVersion: v1
kind: Service 
metadata: 
  name: rabbitmq-client
  namespace:  {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: robot-shop
    app.kubernetes.io/component: rabbitmq

spec:
  type: {{ .Values.rabbitmq.clientService.type }}
  selector:
    app.kubernetes.io/component: rabbitmq
  ports:
    - name: amqp
      port: {{ .Values.rabbitmq.clientService.port }}
      targetPort: {{ .Values.rabbitmq.clientService.port }}
