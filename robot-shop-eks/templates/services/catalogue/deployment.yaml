apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.catalogue.replicaCount }}

  selector:
    matchLabels:
      app: catalogue

  template:
    metadata:
      labels:
        app: catalogue
  
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false

      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mongodb 27017; do sleep 2; done"]

      containers:
        - name: catalogue
          image: "{{ .Values.catalogue.image.repository }}:{{ .Values.catalogue.image.tag }}"
          imagePullPolicy: {{ .Values.catalogue.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.catalogue.service.port }}
          
          securityContext: 
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: {{ .Values.catalogue.resources.requests.cpu | quote }}
              memory: {{ .Values.catalogue.resources.requests.memory | quote }}

            limits:
              cpu: {{ .Values.catalogue.resources.limits.cpu | quote }}
              memory: {{ .Values.catalogue.resources.limits.memory | quote }}

          readinessProbe: 
            httpGet:
              path: /health
              port: {{ .Values.catalogue.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.catalogue.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10

        