apiVersion: apps/v1
kind: Deployment

metadata:
  name: ratings
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.ratings.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/component: ratings

  template:
    metadata:
      labels:
        app.kubernetes.io/component: ratings

    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36

          command:
            - sh
            - -c
            - until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done

          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

            capabilities:
              drop:
                - ALL

      containers:
        - name: ratings
          image: "{{ .Values.ratings.image.repository }}:{{ .Values.ratings.image.tag }}"
          imagePullPolicy: {{ .Values.ratings.image.pullPolicy }}

          ports:
            - containerPort: 80

          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: {{ .Values.ratings.resources.requests.cpu | quote }}
              memory: {{ .Values.ratings.resources.requests.memory | quote }}

            limits:
              cpu: {{ .Values.ratings.resources.limits.cpu | quote }}
              memory: {{ .Values.ratings.resources.limits.memory | quote }}

          readinessProbe:
            httpGet:
              path: /_health
              port: {{ .Values.ratings.service.port }}

            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30

          livenessProbe:
            httpGet:
              path: /_health
              port: {{ .Values.ratings.service.port }}

            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3