apiVersion: apps/v1 
kind: Deployment
metadata:
  name: web 
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.web.replicaCount }} 
  selector:
    matchLabels:
      app.kubernetes.io/component: web 

  template:
    metadata: 
      labels:
        app.kubernetes.io/component: web
    
    spec: 
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false 

      securityContext:
        seccompProfile:
          type: RuntimeDefault
      
      initContainers:
        - name: wait-for-catalogue
          image: busybox:1.36
          command: ["sh","-c","until nc -z catalogue 8080; do sleep 2; done"]

        - name: wait-for-user
          image: busybox:1.36
          command: ["sh","-c","until nc -z user 8080; do sleep 2; done"]

        - name: wait-for-cart
          image: busybox:1.36
          command: ["sh","-c","until nc -z cart 8080; do sleep 2; done"]

        - name: wait-for-shipping
          image: busybox:1.36
          command: ["sh","-c","until nc -z shipping 8080; do sleep 2; done"]

        - name: wait-for-payment
          image: busybox:1.36
          command: ["sh","-c","until nc -z payment 8080; do sleep 2; done"]

        - name: wait-for-ratings
          image: busybox:1.36
          command: ["sh","-c","until nc -z ratings 80; do sleep 2; done"]

      containers:
        - name: web 
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy:  {{ .Values.web.image.pullPolicy }} 

          ports:
            - containerPort: {{ .Values.web.service.targetPort }}
          
          securityContext:
            allowPrivilegeEscalation: false 
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          
          env:
            - name: CATALOGUE_HOST
              value:  {{ .Values.web.env.catalogueHost | quote }}
            - name: USER_HOST
              value: {{ .Values.web.env.userHost | quote }}
            - name: CART_HOST
              value: {{ .Values.web.env.cartHost | quote }}
            - name: SHIPPING_HOST
              value: {{ .Values.web.env.shippingHost | quote }}
            - name: PAYMENT_HOST
              value: {{ .Values.web.env.paymentHost | quote }}
            - name: RATINGS_HOST
              value: {{ .Values.web.env.ratingsHost | quote }}

          resources:
            requests:
              cpu: {{ .Values.web.resources.requests.cpu | quote }}
              memory: {{ .Values.web.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.web.resources.limits.cpu | quote }}
              memory: {{ .Values.web.resources.limits.memory | quote }}

          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3



