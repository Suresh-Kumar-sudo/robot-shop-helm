apiVersion: apps/v1
kind: Deployment
metadata: 
  name: shipping
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.shipping.replicaCount }}

  selector: 
    matchLabels:  
      app.kubernetes.io/component: shipping
  
  template:
    metadata: 
      labels:
        app.kubernetes.io/component: shipping 
    
    spec: 
      serviceAccountName: {{ .Values.serviceAccount.name }} 
      automountServiceAccountToken: false

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36 
          command:
            - sh 
            - -c 
            - until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done 
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

        - name: wait-for-cart
          image: busybox:1.36 
          command:
            - sh
            - -c 
            - until nc -z cart 8080; do echo waiting for cart; sleep 2; done 
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true 
            capabilities:
              drop: ["ALL"]
      
      containers:
        - name: shipping 
          image: "{{ .Values.shipping.image.repository }}:{{ .Values.shipping.image.tag }}"
          imagePullPolicy: {{ .Values.shipping.image.pullPolicy }}
 
          ports:
            - containerPort: {{ .Values.shipping.service.port }}
          
          securityContext: 
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

          env:
            - name: CART_ENDPOINT
              value: {{ .Values.shipping.env.cartEndpoint | quote }}

            - name: DB_HOST
              value: {{ .Values.shipping.env.dbHost | quote }}

            - name: JAVA_OPTS
              value: {{ .Values.shipping.env.javaOpts | quote }}

          
          resources:
            requests:
              cpu: {{ .Values.shipping.resources.requests.cpu | quote }}
              memory: {{ .Values.shipping.resources.requests.memory | quote }}
             
            limits:
              cpu: {{ .Values.shipping.resources.limits.cpu | quote }}
              memory: {{ .Values.shipping.resources.limits.memory | quote }}
          
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.shipping.service.port }}
            failureThreshold: 30
            periodSeconds: 10 
            timeoutSeconds: 5 

          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.shipping.service.port }}
            initialDelaySeconds: 60
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.shipping.service.port }}
            initialDelaySeconds: 120
            failureThreshold: 3
            periodSeconds: 10 
            timeoutSeconds: 5 


            
        
