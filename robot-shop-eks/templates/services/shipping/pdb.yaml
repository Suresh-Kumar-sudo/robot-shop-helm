{{- if .Values.shipping.pdb.enabled }}

apiVersion: policy/v1 
kind: PodDisruptionBudget
metadata:
  name: shipping-pdb 
  namespace: {{ .Values.namespace }} 

spec: 
  maxUnavailable: {{ .Values.shipping.pdb.maxUnavailable }} 

  selector:
    matchLabels:  
      app.kubernetes.io/component: shipping


{{- end }}