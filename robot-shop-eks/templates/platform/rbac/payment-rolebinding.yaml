# RoleBinding: wire the Role to payment SA only
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: robot-shop-payment-secret-reader
  namespace: robot-shop
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind:     Role
  name:     robot-shop-payment-secret-reader
subjects:
  - kind:      ServiceAccount
    name:      robot-shop-payment
    namespace: robot-shop