apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: robot-shop
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Suresh-Kumar-sudo/robot-shop-helm.git
    targetRevision: HEAD
    path: robot-shop-eks

  destination:
    server: https://kubernetes.default.svc
    namespace: robot-shop

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true